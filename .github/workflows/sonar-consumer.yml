name: Sonar (consume reusable)

on:
  push:
    branches: [main]

permissions:
  pull-requests: read
  contents: read

jobs:
  sonar:
    uses: sonar-local/workflows/.github/workflows/sonar-reusable.yml@v1
    with:
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY }}
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
